<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Prava-ol</title></head>
<body style="margin:0;background:#0f1724;color:#fff;font-family:sans-serif">
<div id="splash" style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
<div style="font-size:80px">&#x1F6A6;</div>
<h1>Prava-ol</h1>
<p style="color:#8896b3">Imtihonga tayyorlaning</p>
</div>
<div id="app" style="display:none">
<h2 style="color:#00e676;padding:20px">Ilova ishlayapti!</h2>
<button onclick="document.getElementById('app').innerHTML='<h2 style=padding:20px>Til tanlandi!</h2>'" style="margin:20px;padding:16px 32px;background:#2979ff;border:none;color:#fff;border-radius:12px;font-size:18px;cursor:pointer">O'zbek tili</button>
</div>
<script>
setTimeout(function(){
  document.getElementById('splash').style.display='none';
  document.getElementById('app').style.display='block';
}, 2000);
</script>
</body></html>
